name: API Testing

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 6 * * *'

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: execute tests
      run: mvn clean test -Dsuite=suite -X
    - name: Upload a Build Artifact
      uses: actions/upload-artifact@v7.0.1
      with:
        name: Logs
        path: logs/
