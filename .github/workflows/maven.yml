name: API Testing

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 6 * * *'

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      issues: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: execute tests
      run: mvn clean test -Dsuite=suite -X
    - name: Upload a Build Artifact
      if: always()
      uses: actions/upload-artifact@v7.0.1
      with:
        name: Logs
        path: logs/

     - name: Publish Test Report
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: TestNG Results
        # Highlight-start
        # Selects only compliant JUnit XML result formats and filters out malformed summaries
        path: '**/target/surefire-reports/junitreports/TEST-*.xml'
        # Highlight-end
        reporter: java-junit



